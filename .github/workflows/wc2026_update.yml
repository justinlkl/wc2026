name: WC 2026 — Auto Update Predictions

on:
  schedule:
    # Daily at 06:00 UTC (match/xG data refreshes once per day)
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e . --quiet

      - name: Refresh data, retrain, and predict
        run: python -m wc2026.wc2026_scheduler --once --force-download

      - name: Commit updated data & predictions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # outputs/ and models/*.joblib are in .gitignore — force-add tracked output files
          git add -f outputs/wc2026_predictions.csv data/fixtures.csv data/matches_detailed.csv data/github_wc2026/ models/training_meta.json
          git diff --staged --quiet || git commit -m "chore: auto-update WC 2026 data & predictions $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
